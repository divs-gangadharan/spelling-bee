        .btn-toggle { background: #95a5a6; color: white; }
        #stats { font-weight: bold; margin-left: auto; color: #2c3e50; }
        .yg-link { color: #e74c3c; font-size: 0.8em; font-weight: bold; text-decoration: none; border: 1px solid #e74c3c; padding: 2px 5px; border-radius: 3px; display: none; margin-left: 5px; }

    const masterList = [...schoolList, ...classroomList];
    let mastered = JSON.parse(localStorage.getItem('studyProgress')) || {};

    function renderWords() {
        const container = document.getElementById('wordContainer');
        const searchTerm = document.getElementById('searchBar').value.toLowerCase();
        container.innerHTML = '';
        let count = 0;

        masterList.forEach((word, index) => {
            const isDone = mastered[word] || false;
            if (isDone) count++;
            
            // Filters
            const matchesSearch = word.toLowerCase().includes(searchTerm);
            const matchesTab = currentFilter === 'all' || (currentFilter === 'todo' && !isDone);

            if (matchesSearch && matchesTab) {
                const row = document.createElement('div');
                row.className = `word-row ${isDone ? 'completed' : ''}`;
                row.innerHTML = `
                    <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleMastery('${word}')">
                    <span>${index + 1}</span>
                    <button class="btn btn-audio" onclick="playAudio('${word}', ${index})">🔊 Audio</button>
                    <strong class="word-text">${word}</strong>
                    <div style="display:flex; align-items:center;">
                        <button class="btn btn-info" onclick="showInfo('${word}')">📖 Info</button>
                        <a id="yg-${index}" href="https://youglish.com/pronounce/${word}/english" target="_blank" class="yg-link">YouGlish</a>
                    </div>
                `;
                container.appendChild(row);
            }
        });
        document.getElementById('stats').innerText = `Mastered: ${count} / ${masterList.length}`;
        localStorage.setItem('studyProgress', JSON.stringify(mastered));
    }

    async function showInfo(word) {
        let definition = "Fetching...";
        let pos = "noun";

        if (wordRef[word.toLowerCase()]) {
            definition = wordRef[word.toLowerCase()].def;
            pos = wordRef[word.toLowerCase()].pos;
        } else {
            try {
                const res = await fetch(`https://www.dictionaryapi.com/api/v3/references/collegiate/json/${word}?key=${MW_KEY}`);
                const data = await res.json();
                definition = data[0].shortdef[0];
                pos = data[0].fl;
            } catch (e) { definition = "Offline definition not found."; }
        }
        alert(`WORD: ${word.toUpperCase()}\nPOS: ${pos}\nDEF: ${definition}`);
    }

    async function playAudio(word, index) {
        try {
            const res = await fetch(`https://www.dictionaryapi.com/api/v3/references/collegiate/json/${word}?key=${MW_KEY}`);
            const data = await res.json();
            const audio = data[0].hwi.prs[0].sound.audio;
            const sub = audio.startsWith('bix') ? 'bix' : audio.startsWith('gg') ? 'gg' : audio[0];
            new Audio(`https://media.merriam-webster.com/audio/prons/en/us/mp3/${sub}/${audio}.mp3`).play();
        } catch (e) {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(word));
            document.getElementById(`yg-${index}`).classList.add('active');
        }
    }

    function toggleAll() {
        const btn = document.getElementById('bulkToggle');
        const shouldCheck = btn.innerText === "Check All";
        masterList.forEach(w => mastered[w] = shouldCheck);
        btn.innerText = shouldCheck ? "Uncheck All" : "Check All";
        renderWords();
    }

    function toggleMastery(word) { mastered[word] = !mastered[word]; renderWords(); }
    function setView(v) { currentFilter = v; renderWords(); }
    function filterWords() { renderWords(); }

    renderWords();
</script>

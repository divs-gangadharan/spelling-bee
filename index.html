<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Spelling Tracker 2026</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 5px; }
        .container { max-width: 480px; margin: auto; background: #fff; padding: 10px; border-radius: 8px; }
        h2 { font-size: 1.1em; text-align: center; margin: 10px 0; }
        .toolbar { position: sticky; top: 0; background: #fff; padding: 10px 0; border-bottom: 2px solid #eee; display: flex; flex-wrap: wrap; gap: 5px; justify-content: space-between; z-index: 1000; }
        .search-box { flex-grow: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .word-row { display: flex; align-items: center; padding: 6px 2px; border-bottom: 1px solid #eee; font-size: 15px; gap: 6px; }
        .word-row.completed { background: #e8f5e9; color: #888; }
        .col-num { width: 30px; font-size: 11px; color: #999; flex-shrink: 0; text-align: right; }
        .col-check { width: 22px; flex-shrink: 0; }
        .col-audio { width: 28px; flex-shrink: 0; }
        .col-word { flex-grow: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
        .btn { border: none; border-radius: 4px; cursor: pointer; padding: 4px; font-size: 15px; line-height: 1; }
        .btn-audio { background: #3498db; color: white; }
        .btn-info { background: #2ecc71; color: white; }
        .btn-filter { background: #95a5a6; color: white; padding: 4px 8px; font-size: 12px; }
        .yg-link { color: #e74c3c; font-size: 10px; text-decoration: none; border: 1px solid #e74c3c; padding: 1px 3px; border-radius: 3px; display: none; font-weight: bold; }
        .yg-link.active { display: inline-block; }
        #stats { font-size: 12px; width: 100%; text-align: center; margin-top: 5px; color: #555; }
    </style>
</head>
<body>

        <button class="btn btn-filter" id="bulkToggle" onclick="toggleAll()">Check All</button>
        <div id="stats">Mastered: 0 / 700</div>
    </div>
    <div id="wordContainer"></div>
</div>

    const classroomList = ["tag", "deck", "snug", "hold", "stay", "draw", "cozy", "milk", "tank", "crowd", "skirt", "quilt", "taffy", "stretch", "candy", "ruby", "tackle", "skater", "bucket", "baskets", "paste", "farmer", "tail", "slime", "teeth", "bait", "cluster", "hollow", "baffling", "hoist", "remind", "coral", "shimmer", "swampy", "focus", "lessons", "ajar", "triple", "ahoy", "answer", "dollop", "silver", "circus", "kitchen", "awkward", "sweet", "faint", "roam", "woozy", "ahead", "unicorn", "heater", "understand", "leaning", "window", "message", "forepaw", "hedgehog", "garbage", "mermaid", "disability", "leather", "nervous", "cartwheel", "weather", "attacked", "eaten", "journey", "shouting", "curious", "brilliant", "gorgeous", "dangerous", "valentine", "formation", "hesitate", "scavenger", "deflated", "ration", "crawdad", "unruly", "aroma", "artifacts", "sinister", "discoveries", "language", "Buffalo", "gallop", "lanky", "mysterious", "sardines", "conical", "lilt", "porridge", "rummage", "ancestral", "gaunt", "geranium", "dubious", "foreign", "verdict", "encourages", "miniature", "preamble", "reprimanding", "oblivion", "steeple", "lanyards", "parchment", "fugitive", "dissolving", "billowed", "Berlin", "conjure", "noggin", "rakish", "rotunda", "toiletries", "jeered", "prattling", "emporium", "eccentric", "almanac", "samosas", "pistachio", "zombielike", "colossus", "dimensional", "graffitist", "dexterity", "marauder", "battlements", "albatross", "opalescent", "Yiddish", "tranquilizer", "plaited", "manticores", "fraidycat", "lo mein", "sans serif", "stucco", "schema", "vidimus", "slough", "serape", "pinioning", "pheromone", "magnanimous", "wainscoting", "gangly", "chimneys", "plaid", "zeal", "depots", "salvaged", "enthusiastic", "unfamiliar", "dignitaries", "dismissal", "careened", "opportunist", "comrades", "promenade", "invincible", "parachute", "appointment", "ratify", "reclusive", "bulletin", "officially", "bayonet", "exuberant", "equations", "ultimatum", "squ     const masterList = [...schoolList, ...classroomList];
    let mastered = JSON.parse(localStorage.getItem('studyProgress')) || {};

    function renderWords() {
        const container = document.getElementById('wordContainer');
        const searchTerm = document.getElementById('searchBar').value.toLowerCase();
        container.innerHTML = '';
        let count = 0;
        masterList.forEach((word, index) => {
            const isDone = mastered[word] || false;
            if (isDone) count++;
            if (currentFilter === 'todo' && isDone) return;
            if (searchTerm && !word.toLowerCase().includes(searchTerm)) return;
            const row = document.createElement('div');
            row.className = `word-row ${isDone ? 'completed' : ''}`;
            row.innerHTML = `<div class="col-num">${index + 1}</div><div class="col-check"><input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleMastery('${word}')"></div><div class="col-audio"><button class="btn btn-audio" onclick="playMW('${word}', ${index})">🔊</button></div><div class="col-word">${word}</div><div class="col-actions"><button class="btn btn-info" onclick="showInfo('${word}')">📖</button><a id="yg-${index}" href="https://youglish.com/pronounce/${word}/english" target="_blank" class="yg-link">YG</a></div>`;
            container.appendChild(row);
        });
        document.getElementById('stats').innerText = `Mastered: ${count} / ${masterList.length}`;
        localStorage.setItem('studyProgress', JSON.stringify(mastered));
    }

    async function playMW(word, index) {
        try {
            const res = await fetch(`https://www.dictionaryapi.com/api/v3/references/collegiate/json/${word}?key=${MW_KEY}`);
            const data = await res.json();
            if (data?.[0]?.hwi?.prs?.[0]?.sound) {
                const audio = data[0].hwi.prs[0].sound.audio;
                const sub = audio.startsWith('bix') ? 'bix' : audio.startsWith('gg') ? 'gg' : /^[0-9_]/.test(audio) ? 'number' : audio[0];
                new Audio(`https://media.merriam-webster.com/audio/prons/en/us/mp3/${sub}/${audio}.mp3`).play();
            } else throw new Error();
        } catch (e) {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(word));
            const yg = document.getElementById(`yg-${index}`);
            if(yg) yg.classList.add('active');
        }
    }

    async function showInfo(word) {
        const cleanWord = word.toLowerCase().trim();
        let pos = "noun", def = "";

        // 1. Check Local Dictionary Fallback first for specialized Bee terms
        if (localDict[cleanWord]) {
            pos = localDict[cleanWord].pos;
            def = localDict[cleanWord].def;
        } else {
            // 2. Fetch from Merriam-Webster
            try {
                const res = await fetch(`https://www.dictionaryapi.com/api/v3/references/collegiate/json/${word}?key=${MW_KEY}`);
                const data = await res.json();
                if (data && data[0] && typeof data[0] === 'object') {
                    def = data[0].shortdef ? data[0].shortdef[0] : "Check online for full details.";
                    pos = data[0].fl || "part of speech unknown";
                } else {
                    def = "Specialized spelling bee term. Please search for context.";
                    pos = "varies";
                }
            } catch (e) { 
                def = "API error. Check manually.";
            }
        }
        alert(`WORD: ${word.toUpperCase()}\nTYPE: ${pos}\nDEF: ${def}`);
    }

    function toggleMastery(word) { mastered[word] = !mastered[word]; renderWords(); }
    function setView(v) { currentFilter = v; renderWords(); }
    function toggleAll() {
        const btn = document.getElementById('bulkToggle');
        const shouldCheck = btn.innerText === "Check All";
        masterList.forEach(w => mastered[w] = shouldCheck);
        btn.innerText = shouldCheck ? "Uncheck All" : "Check All";
        renderWords();
    }
    renderWords();
</script>
